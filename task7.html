<!DOCTYPE html>
<html>
<head>
  <title>Product Cards</title>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      width: 220px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .card h3 {
      font-size: 16px;
    }

    .card p {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Product List</h1>

  <div id="productContainer"></div>

  <script src="task7.js"></script>
</body>
</html>
